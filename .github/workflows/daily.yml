name: Daily Paper Push

on:
  schedule:
    # UTC 23:00 = 北京时间 7:00
    - cron: '0 23 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  push-papers:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Write private config
        if: ${{ secrets.PAPFAST_CONFIG_JSON_BASE64 != '' }}
        shell: bash
        run: |
          mkdir -p config
          echo "${{ secrets.PAPFAST_CONFIG_JSON_BASE64 }}" | base64 --decode > config/config.local.json

      - name: Run Papfast
        run: npm start
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          EASYSCHOLAR_KEY: ${{ secrets.EASYSCHOLAR_KEY }}

      - name: Persist sent-papers state
        if: ${{ vars.PAPFAST_PERSIST_STATE == 'true' }}
        shell: bash
        run: |
          if [ ! -f data/sent-papers.json ]; then
            echo "No sent-papers file generated, skip persist."
            exit 0
          fi

          rm -f data/sent-papers.json.tmp

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -f data/sent-papers.json

          if git diff --cached --quiet; then
            echo "No dedup-state change to commit."
            exit 0
          fi

          git commit -m "chore: persist sent papers state [skip ci]"
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push origin HEAD:"${GITHUB_REF_NAME}"
