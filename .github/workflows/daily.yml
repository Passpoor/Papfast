name: Daily Paper Push

on:
  schedule:
    # UTC 23:00 = 北京时间 7:00
    - cron: '0 23 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  push-papers:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run Papfast
        run: npm start
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          EASYSCHOLAR_KEY: ${{ secrets.EASYSCHOLAR_KEY }}

      - name: Persist sent papers state
        if: always()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 如果没有状态文件，先跳过
          if [ ! -f "data/sent-papers.json" ]; then
            echo "no sent-papers.json to persist"
            exit 0
          fi

          # 配置提交身份（使用 GitHub Actions 机器人）
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # 仅当文件有变化时才提交
          if git diff --quiet -- data/sent-papers.json; then
            echo "sent-papers.json not changed, skip commit"
            exit 0
          fi

          git add data/sent-papers.json
          git commit -m "chore: update sent papers state [skip ci]" || exit 0
          git push origin HEAD
