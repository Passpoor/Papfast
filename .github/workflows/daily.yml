name: Daily Paper Push

on:
  schedule:
    # UTC 23:00 = 北京时间 7:00
    - cron: '0 23 * * *'
  # 支持手动触发
  workflow_dispatch:

jobs:
  push-papers:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm install
      
      - name: Run Papfast
        run: npm start
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          EASYSCHOLAR_KEY: ${{ secrets.EASYSCHOLAR_KEY }}

      # 说明：
      # 公共仓库默认不再自动把 data/sent-papers.json 提交回仓库，以避免泄露个人订阅历史。
      # 如果你在自己的私有 fork 中希望启用基于 GitHub Actions 的跨天去重，
      # 可以在私有仓库中添加一个额外步骤，将 data/sent-papers.json 提交回去。
